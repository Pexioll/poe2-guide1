<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title and page.title != site.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="{{ "/" | relative_url }}" class="site-title">PoE2 Guide</a>
      <nav class="site-nav">
        <a href="{{ "/" | relative_url }}" class="nav-link{% if page.url == "/" %} active{% endif %}">Home</a>
        <a href="{{ "/campaign/" | relative_url }}" class="nav-link{% if page.url contains "campaign" %} active{% endif %}">Campaign</a>
        <a href="{{ "/build/" | relative_url }}" class="nav-link{% if page.url contains "build" %} active{% endif %}">Build</a>
      </nav>
    </div>
  </header>

  <main class="page-content">
    <div class="wrapper">
      {{ content }}
    </div>
  </main>

  <div class="theme-switcher">
    <label for="theme-select">Theme</label>
    <select id="theme-select" onchange="setTheme(this.value)">
      <option value="default">Default</option>
      <option value="minimal">Minimal</option>
      <option value="codex">Codex</option>
    </select>
  </div>

  <script>
    function setTheme(t) {
      document.body.className = t === 'default' ? '' : 'theme-' + t;
      localStorage.setItem('poe2-theme', t);
    }
    (function () {
      var saved = localStorage.getItem('poe2-theme');
      if (saved) {
        setTheme(saved);
        var sel = document.getElementById('theme-select');
        if (sel) sel.value = saved;
      }
    })();
  </script>

</body>
</html>
